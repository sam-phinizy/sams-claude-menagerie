name: Sync Marketplace README (${{ github.event.client_payload.plugin || github.event_name }})

on:
  repository_dispatch:
    types: [plugin-published]
  push:
    paths:
      - ".claude-plugin/marketplace.json"
  workflow_dispatch:

concurrency:
  group: sync-marketplace
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Plugin: ${{ github.event.client_payload.plugin || 'n/a' }}"
          echo "Tag: ${{ github.event.client_payload.tag || 'n/a' }}"

      - name: Get app token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update plugin version in marketplace.json
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.plugin != '' && github.event.client_payload.tag != '' }}
        env:
          PLUGIN: ${{ github.event.client_payload.plugin }}
          TAG: ${{ github.event.client_payload.tag }}
        run: python3 scripts/update_version.py

      - name: Generate README
        run: python3 scripts/generate_readme.py

      - name: Commit if changed
        run: |
          git config user.name "menagerie-publisher[bot]"
          git config user.email "menagerie-publisher[bot]@users.noreply.github.com"
          git add README.md .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes" && exit 0
          PLUGIN="${{ github.event.client_payload.plugin || '' }}"
          TAG="${{ github.event.client_payload.tag || '' }}"
          if [ -n "$PLUGIN" ] && [ -n "$TAG" ]; then
            MSG="chore: update $PLUGIN to $TAG"
          elif [ -n "$PLUGIN" ]; then
            MSG="chore: regenerate README — triggered by $PLUGIN"
          else
            MSG="chore: regenerate README — marketplace.json update"
          fi
          git commit -m "$MSG"
          git push

name: Sync Marketplace README (${{ github.event.client_payload.plugin || github.event_name }})

on:
  repository_dispatch:
    types: [plugin-published]
  push:
    paths:
      - ".claude-plugin/marketplace.json"
  workflow_dispatch:

concurrency:
  group: sync-marketplace
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Plugin: ${{ github.event.client_payload.plugin || 'n/a' }}"
          echo "Tag: ${{ github.event.client_payload.tag || 'n/a' }}"

      - name: Get app token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update plugin version in marketplace.json
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.plugin != '' && github.event.client_payload.tag != ''
        env:
          PLUGIN: ${{ github.event.client_payload.plugin }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          python3 - <<'EOF'
          import json, os, sys

          plugin_name = os.environ["PLUGIN"]
          tag = os.environ["TAG"]

          with open(".claude-plugin/marketplace.json") as f:
            data = json.load(f)

          updated = False
          for p in data["plugins"]:
            if p["name"] == plugin_name:
              p["version"] = tag
              p["source"]["ref"] = tag
              updated = True
              break

          if not updated:
            print(f"Plugin '{plugin_name}' not found in marketplace.json, skipping version update")
            sys.exit(0)

          with open(".claude-plugin/marketplace.json", "w") as f:
            json.dump(data, f, indent=2)
            f.write("\n")

          print(f"Updated {plugin_name} to {tag}")
          EOF

      - name: Generate README
        run: |
          python3 - <<'EOF'
          import json

          with open(".claude-plugin/marketplace.json") as f:
            data = json.load(f)

          plugins = data["plugins"]

          lines = []
          lines.append("# Sam's Claude Menagerie\n")
          lines.append("A collection of Claude Code plugins by [Sam Phinizy](https://github.com/sam-phinizy).\n")
          lines.append("## Plugins\n")
          lines.append("| Plugin | Version | Description | Repo |")
          lines.append("|--------|---------|-------------|------|")

          for p in plugins:
            name = p["name"]
            desc = p["description"]
            repo = p["source"]["repo"]
            version = p.get("version", "latest")
            lines.append(f"| **{name}** | {version} | {desc} | [{repo}](https://github.com/{repo}) |")

          lines.append("")
          lines.append("## Installation\n")
          lines.append("Inside Claude Code, add this marketplace:\n")
          lines.append("```")
          lines.append("/plugin marketplace add sam-phinizy/sams-claude-menagerie")
          lines.append("```\n")
          lines.append("Then install individual plugins:\n")
          lines.append("```")
          for p in plugins:
            lines.append(f"/plugin install {p['name']}@sams-claude-menagerie")
          lines.append("```")

          with open("README.md", "w") as f:
            f.write("\n".join(lines) + "\n")

          print("README.md generated")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "menagerie-publisher[bot]"
          git config user.email "menagerie-publisher[bot]@users.noreply.github.com"
          git add README.md .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes" && exit 0
          PLUGIN="${{ github.event.client_payload.plugin || '' }}"
          TAG="${{ github.event.client_payload.tag || '' }}"
          if [ -n "$PLUGIN" ] && [ -n "$TAG" ]; then
            MSG="chore: update $PLUGIN to $TAG"
          elif [ -n "$PLUGIN" ]; then
            MSG="chore: regenerate README — triggered by $PLUGIN"
          else
            MSG="chore: regenerate README — marketplace.json update"
          fi
          git commit -m "$MSG"
          git push
